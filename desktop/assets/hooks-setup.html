<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enable real-time monitoring</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #f0f6fc; margin: 0; padding: 24px; font-size: 13px; line-height: 1.5; }
    h1 { font-size: 16px; margin: 0 0 12px; color: #f0f6fc; }
    p { margin: 0 0 12px; color: #8b949e; }
    code { background: #161b22; border: 1px solid #30363d; border-radius: 4px; padding: 2px 6px; font-family: monospace; font-size: 11px; color: #58a6ff; }
    .file { color: #3fb950; }
    .buttons { display: flex; gap: 8px; margin-top: 20px; }
    button { border: none; border-radius: 6px; padding: 8px 16px; font-size: 13px; cursor: pointer; }
    .primary { background: #238636; color: #f0f6fc; }
    .primary:hover { background: #2ea043; }
    .secondary { background: #21262d; color: #f0f6fc; border: 1px solid #30363d; }
    .secondary:hover { background: #30363d; }
  </style>
</head>
<body>
  <h1>Enable real-time monitoring</h1>
  <p>Hooks let Claude Code report agent status instantly. Without them, the dashboard polls JSONL files (~500ms lag).</p>
  <p>This adds a <code>curl</code> command to 9 hook events in <span class="file">~/.claude/settings.json</span>.</p>
  <div class="buttons">
    <button class="primary" onclick="window.electronAPI.installHooks()">Install hooks</button>
    <button class="secondary" onclick="window.electronAPI.closeWindow()">Skip for now</button>
  </div>
</body>
</html>
