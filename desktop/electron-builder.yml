appId: com.the-office.app
electronVersion: "33.4.11"
productName: The Office
npmRebuild: false
directories:
  output: dist-electron
files:
  - dist/**
extraMetadata:
  main: dist/main.js
extraResources:
  - from: "../server/dist"
    to: "server/dist"
  - from: "../client/dist"
    to: "client/dist"
mac:
  category: public.app-category.developer-tools
  target: dmg
win:
  target: nsis
linux:
  target: AppImage
publish:
  provider: github
  owner: Resip10
  repo: the-office
  releaseType: release
