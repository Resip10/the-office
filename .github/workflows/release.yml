name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build server + client
        run: npm run build

      - name: Build desktop (compile TS)
        run: npm run build -w desktop

      - name: Extract app-builder-bin to runner temp
        shell: bash
        run: |
          EXTRACT_DIR="$RUNNER_TEMP/app-builder-bin"
          curl -fsSL "https://registry.npmjs.org/app-builder-bin/-/app-builder-bin-5.0.0-alpha.10.tgz" \
            -o "$RUNNER_TEMP/app-builder-bin.tgz"
          rm -rf "$EXTRACT_DIR"
          mkdir -p "$EXTRACT_DIR"
          tar -xf "$RUNNER_TEMP/app-builder-bin.tgz" -C "$EXTRACT_DIR" --strip-components=1
          BINARY_PATH=$(node -e "
            const p = require('path'), { platform: pl, arch: ar } = process;
            const d = p.join(process.env.RUNNER_TEMP, 'app-builder-bin');
            let b;
            if (pl === 'darwin') b = p.join(d, 'mac', 'app-builder_' + (ar === 'x64' ? 'amd64' : ar));
            else if (pl === 'win32') b = p.join(d, 'win', ar, 'app-builder.exe');
            else b = p.join(d, 'linux', ar, 'app-builder');
            process.stdout.write(b);
          ")
          chmod +x "$BINARY_PATH" 2>/dev/null || true
          echo "Binary: $BINARY_PATH"
          ls -la "$BINARY_PATH"
          echo "CUSTOM_APP_BUILDER_PATH=$BINARY_PATH" >> "$GITHUB_ENV"

      - name: Package with electron-builder
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run package -w desktop
