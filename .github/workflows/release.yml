name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Extract app-builder-bin binaries (npm workspace skips binary files)
        shell: bash
        run: |
          echo "=== Before: node_modules/app-builder-bin contents ==="
          ls -la node_modules/app-builder-bin/ 2>/dev/null || echo "(directory missing)"
          rm -rf node_modules/app-builder-bin
          mkdir -p node_modules/app-builder-bin
          echo "=== Downloading tarball ==="
          curl -fsSL "https://registry.npmjs.org/app-builder-bin/-/app-builder-bin-5.0.0-alpha.10.tgz" \
            -o /tmp/app-builder-bin.tgz
          echo "=== Tarball size: $(wc -c < /tmp/app-builder-bin.tgz) bytes ==="
          tar -xzf /tmp/app-builder-bin.tgz -C node_modules/app-builder-bin --strip-components=1
          echo "=== After: node_modules/app-builder-bin contents ==="
          ls -la node_modules/app-builder-bin/
          echo "=== node.js resolves app-builder-bin to: ==="
          node -e "console.log(require('app-builder-bin').appBuilderPath)"

      - name: Build server + client
        run: npm run build

      - name: Build desktop (compile TS)
        run: npm run build -w desktop

      - name: Package with electron-builder
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run package -w desktop
